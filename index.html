<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vương Vĩnh Khang | Bio</title>

    <!-- SEO & Social Share -->
    <meta name="description" content="Trang bio cá nhân của Vương Vĩnh Khang (@khang0811) — Facebook, Discord, Zalo và các dự án Bot.">
    <meta name="author" content="Vương Vĩnh Khang">
    <meta name="theme-color" content="#0a0a0f">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Vương Vĩnh Khang | Bio">
    <meta property="og:description" content="Kết nối với mình qua Facebook, Discord, Zalo và các dự án Bot.">
    <meta property="og:image" content="avatar.jpg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Vương Vĩnh Khang | Bio">
    <meta name="twitter:description" content="Kết nối với mình qua Facebook, Discord, Zalo và các dự án Bot.">
    <meta name="twitter:image" content="avatar.jpg">

    <!-- Favicon / PWA -->
    <link rel="icon" href="avatar.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="avatar.jpg">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #6d8bff;
            --accent-2: #b06dff;
            --glass: rgba(25, 25, 30, 0.42);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow-x: hidden;
            scrollbar-gutter: stable;
        }

        ::-webkit-scrollbar {
            width: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px;
            min-height: 100%;
        }

        /* ---------- BACKGROUND LAYERS ---------- */
        .bg-fixed {
            position: fixed;
            inset: 0;
            background: #000 url('nen.jpg') no-repeat center center;
            background-size: cover;
            z-index: -3;
            transform: translateZ(0) scale(1.05);
            animation: bgFloat 24s ease-in-out infinite alternate;
        }

        @keyframes bgFloat {
            from { transform: translateZ(0) scale(1.05) translate(0, 0); }
            to   { transform: translateZ(0) scale(1.12) translate(-12px, -10px); }
        }

        .aurora {
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(40% 40% at 20% 25%, rgba(109, 139, 255, 0.35), transparent 70%),
                radial-gradient(35% 35% at 80% 30%, rgba(176, 109, 255, 0.30), transparent 70%),
                radial-gradient(45% 45% at 50% 90%, rgba(0, 200, 180, 0.22), transparent 70%);
            filter: blur(30px);
            animation: auroraMove 18s ease-in-out infinite alternate;
        }

        @keyframes auroraMove {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(4%, -3%) rotate(8deg); }
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, rgba(0,0,0,0.35), rgba(0,0,0,0.6));
            z-index: -1;
        }

        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ---------- PRELOADER ---------- */
        #preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #preloader.hide {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--accent);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---------- MUSIC PLAYER ---------- */
        .music-player {
            position: fixed;
            bottom: 25px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 14px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .btn-mute {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
        }

        .btn-mute svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Equalizer bars (hiện khi đang phát) */
        .eq {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 16px;
            width: 0;
            overflow: hidden;
            margin-left: 0;
            transition: width 0.3s ease, margin-left 0.3s ease;
        }
        .music-player.playing .eq { width: 18px; margin-left: 8px; }
        .eq span {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            height: 30%;
        }
        .music-player.playing .eq span { animation: bounce 0.9s ease-in-out infinite; }
        .eq span:nth-child(2) { animation-delay: 0.15s; }
        .eq span:nth-child(3) { animation-delay: 0.3s; }
        .eq span:nth-child(4) { animation-delay: 0.45s; }
        @keyframes bounce {
            0%, 100% { height: 25%; }
            50% { height: 100%; }
        }

        .music-controls {
            display: flex;
            align-items: center;
            width: 0;
            overflow: hidden;
            transition: width 0.3s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .music-player:hover .music-controls,
        .music-player.active .music-controls {
            width: 110px;
            margin-left: 10px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }

        /* ---------- CARD ---------- */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            padding: 40px 0 24px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
            -webkit-backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
            border-radius: 42px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: inset 0 1.5px 4px rgba(255, 255, 255, 0.2), 0 30px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(24px) scale(0.98);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Staggered reveal helper */
        .reveal {
            opacity: 0;
            transform: translateY(14px);
            animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

        .avatar-wrap {
            position: relative;
            width: 94px;
            height: 94px;
            margin: 0 auto 16px;
        }

        .avatar {
            width: 94px;
            height: 94px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.35);
            display: block;
        }

        .avatar-wrap::before {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent), var(--accent-2), #00c8b4, var(--accent));
            z-index: -1;
            animation: spin 6s linear infinite;
            filter: blur(2px);
            opacity: 0.85;
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid rgba(20, 20, 24, 0.9);
            background: #3ba55d;
        }
        .status-dot.idle { background: #faa61a; }
        .status-dot.dnd { background: #ed4245; }
        .status-dot.offline { background: #747f8d; }
        .status-dot.online::after {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid #3ba55d;
            animation: pulse 2s ease-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .verified {
            width: 19px;
            height: 19px;
            flex-shrink: 0;
        }

        .nickname {
            font-size: 14px;
            opacity: 0.55;
            margin-top: 4px;
            display: block;
        }

        .bio {
            font-size: 12.5px;
            opacity: 0.7;
            margin-top: 10px;
            padding: 0 30px;
            line-height: 1.5;
        }

        .nickname + .bio { margin-top: 8px; }

        .tabs-wrapper {
            background: rgba(255, 255, 255, 0.08);
            padding: 5px;
            border-radius: 20px;
            display: flex;
            position: relative;
            margin: 24px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            z-index: 2;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .tab-btn.active { opacity: 1; }

        .tab-slider {
            position: absolute;
            height: calc(100% - 10px);
            top: 5px;
            left: 5px;
            background: linear-gradient(135deg, rgba(109,139,255,0.45), rgba(176,109,255,0.4));
            border-radius: 16px;
            z-index: 1;
            box-shadow: 0 4px 14px rgba(109, 139, 255, 0.3);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1), width 0.4s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .content-window {
            width: 100%;
            overflow: hidden;
        }

        .content-wrapper {
            display: flex;
            width: 100%;
            transition: transform 0.5s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .content-section {
            flex: 0 0 100%;
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            scale: 0.98;
            transition: opacity 0.4s, scale 0.5s;
        }

        .content-section.active {
            opacity: 1;
            scale: 1;
        }

        /* ---------- LINKS ---------- */
        .btn-link {
            position: relative;
            display: flex;
            align-items: center;
            gap: 13px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            text-decoration: none;
            padding: 15px 17px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            overflow: hidden;
            cursor: pointer;
            text-align: left;
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        .btn-link:active { transform: translateY(0) scale(0.98); }

        /* shine sweep */
        .btn-link::after {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }
        .btn-link:hover::after { left: 140%; }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-icon svg { width: 19px; height: 19px; display: block; }

        .btn-text { flex: 1; min-width: 0; }
        .btn-title { display: block; font-weight: 600; }
        .btn-desc { display: block; font-size: 11.5px; opacity: 0.6; margin-top: 2px; font-weight: 400; }

        .btn-arrow {
            opacity: 0.4;
            flex-shrink: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .btn-link:hover .btn-arrow { opacity: 0.8; transform: translateX(3px); }

        /* Brand colors on icon backgrounds */
        .ic-facebook { background: rgba(24, 119, 242, 0.25); }
        .ic-messenger { background: rgba(0, 132, 255, 0.22); }
        .ic-discord { background: rgba(88, 101, 242, 0.25); }
        .ic-youtube { background: rgba(255, 0, 0, 0.22); }
        .ic-instagram { background: rgba(225, 48, 108, 0.22); }
        .ic-tiktok { background: rgba(0, 0, 0, 0.3); }
        .ic-github { background: rgba(255, 255, 255, 0.14); }
        .ic-email { background: rgba(234, 67, 53, 0.22); }
        .ic-zalo { background: rgba(0, 104, 255, 0.28); }

        /* ---------- ZALO ---------- */
        .zalo-expansion-container {
            background: rgba(0, 104, 255, 0.25);
            border: 1px solid rgba(0, 104, 255, 0.3);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
            cursor: pointer;
        }
        .zalo-expansion-container:hover { background: rgba(0, 104, 255, 0.34); }

        .zalo-head {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 15px 17px;
            font-size: 15px;
            font-weight: 600;
        }
        .zalo-head .btn-arrow { transition: transform 0.5s ease; }
        .zalo-expansion-container.open .zalo-head .btn-arrow { transform: rotate(90deg); }

        .qr-reveal {
            max-height: 0;
            opacity: 0;
            padding: 0 12px;
            transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
            overflow: hidden;
        }

        .zalo-expansion-container.open { border-radius: 25px; }
        .zalo-expansion-container.open .qr-reveal {
            max-height: 550px;
            opacity: 1;
            padding-bottom: 12px;
        }

        .qr-image-auto {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
            background: #fff;
        }

        /* ---------- TOAST ---------- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 20, 24, 0.92);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 12px 20px;
            border-radius: 14px;
            font-size: 13.5px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        #toast svg { width: 17px; height: 17px; color: #3ba55d; }

        .credit {
            margin-top: 26px;
            font-size: 10px;
            opacity: 0.25;
            letter-spacing: 2px;
        }
        .credit a { color: inherit; text-decoration: none; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001s !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>

<body>
    <div id="preloader"><div class="loader-ring"></div></div>

    <div class="bg-fixed"></div>
    <div class="aurora"></div>
    <div class="overlay"></div>
    <canvas id="particles"></canvas>

    <div class="music-player" id="player-ui">
        <button class="btn-mute" onclick="toggleMute()" id="mute-btn-container" aria-label="Bật/tắt nhạc">
            <svg id="music-svg" viewBox="0 0 24 24"></svg>
        </button>
        <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <div class="music-controls">
            <input type="range" class="volume-slider" id="volume-control" min="0" max="1" step="0.01" value="0.5"
                aria-label="Âm lượng">
        </div>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="nhac-nen.mp3" type="audio/mpeg">
    </audio>
    <audio id="click-sound" preload="auto">
        <source src="click.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="avatar-wrap reveal" style="animation-delay:.25s">
            <img src="avatar.jpg" alt="Avatar Vương Vĩnh Khang" class="avatar">
            <span class="status-dot" id="status-dot"></span>
        </div>
        <div class="name-row reveal" style="animation-delay:.35s">
            <h1 id="user-name"></h1>
            <svg class="verified" id="verified-badge" viewBox="0 0 24 24" style="display:none" aria-label="Đã xác minh">

                <path fill="#fff" d="M10.6 14.6l-2.2-2.2-1.2 1.2 3.4 3.4 6-6-1.2-1.2z"/>
            </svg>
        </div>
        <span class="nickname reveal" id="user-nickname" style="animation-delay:.42s"></span>
        <p class="bio reveal" id="user-bio" style="animation-delay:.48s; display:none"></p>

        <div class="tabs-wrapper reveal" id="tabs-header" style="animation-delay:.55s">
            <div class="tab-slider" id="slider"></div>
        </div>
        <div class="content-window reveal" style="animation-delay:.62s">
            <div class="content-wrapper" id="master-slider"></div>
        </div>
        <div class="credit reveal" style="animation-delay:.7s">cre: khang0811</div>
    </div>

    <div id="toast"></div>

    <script src="config.js"></script>

            messenger: '<svg viewBox="0 0 24 24" fill="#0084ff"><path d="M12 0C5.24 0 0 4.95 0 11.64c0 3.5 1.44 6.53 3.77 8.62.2.17.31.42.32.68l.07 2.13c.02.68.72 1.12 1.34.85l2.38-1.05c.2-.09.42-.1.63-.05 1.1.3 2.27.46 3.49.46 6.76 0 12-4.95 12-11.64S18.76 0 12 0zm7.2 8.93l-3.52 5.58c-.56.89-1.76 1.11-2.61.49l-2.8-2.1a.72.72 0 0 0-.86 0l-3.78 2.87c-.5.38-1.16-.22-.82-.75l3.52-5.58c.56-.89 1.76-1.11 2.61-.49l2.8 2.1c.26.19.6.19.86 0l3.78-2.87c.5-.38 1.16.22.82.75z"/></svg>',
            youtube: '<svg viewBox="0 0 24 24" fill="#ff0000"><path d="M23.5 6.2a3.02 3.02 0 0 0-2.12-2.14C19.5 3.55 12 3.55 12 3.55s-7.5 0-9.38.51A3.02 3.02 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3.02 3.02 0 0 0 2.12 2.14c1.88.51 9.38.51 9.38.51s7.5 0 9.38-.51a3.02 3.02 0 0 0 2.12-2.14C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>',
            instagram: '<svg viewBox="0 0 24 24" fill="#e1306c"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41a3.7 3.7 0 0 1-1.38-.9 3.7 3.7 0 0 1-.9-1.38c-.16-.42-.36-1.06-.41-2.23C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.06-.36 2.23-.41C8.42 2.17 8.8 2.16 12 2.16zm0 3.68A6.16 6.16 0 1 0 18.16 12 6.16 6.16 0 0 0 12 5.84zm0 10.16A4 4 0 1 1 16 12a4 4 0 0 1-4 4zm6.4-10.4a1.44 1.44 0 1 0 1.44 1.44 1.44 1.44 0 0 0-1.44-1.44z"/></svg>',
            tiktok: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M19.6 5.82a5.13 5.13 0 0 1-3.5-1.4 5.13 5.13 0 0 1-1.51-3.42h-3.4v13.4a3.1 3.1 0 1 1-2.2-2.97V8.04a6.5 6.5 0 1 0 5.6 6.43V8.66a8.5 8.5 0 0 0 5 1.6V6.86a5.1 5.1 0 0 1-.0-.04z"/></svg>',
            github: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.38-1.34-1.75-1.34-1.75-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.34-5.47-5.94 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.93.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/></svg>',
            email: '<svg viewBox="0 0 24 24" fill="none" stroke="#ea4335" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>',
            zalo: '<svg viewBox="0 0 24 24" fill="#0068ff"><path d="M12 2C6.48 2 2 5.94 2 10.8c0 2.78 1.46 5.25 3.74 6.86-.13.95-.5 2.2-1.2 3.34-.2.32.05.74.42.66 1.9-.42 3.3-1.13 4.2-1.7.9.2 1.85.3 2.84.3 5.52 0 10-3.94 10-8.8S17.52 2 12 2z"/></svg>',
            link: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'
        };
        const ARROW = '<svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';

        function guessIcon(title, url) {
            const s = (title + ' ' + (url || '')).toLowerCase();
            if (s.includes('facebook') || s.includes('fb.com')) return 'facebook';
            if (s.includes('m.me') || s.includes('messenger')) return 'messenger';
            if (s.includes('discord')) return 'discord';
            if (s.includes('youtube') || s.includes('youtu.be')) return 'youtube';
            if (s.includes('instagram')) return 'instagram';
            if (s.includes('tiktok')) return 'tiktok';
            if (s.includes('github')) return 'github';
            if (s.includes('zalo')) return 'zalo';
            return 'link';
        }

        /* ================= AUDIO PLAYER ================= */
        const bgMusic = document.getElementById('bg-music');
        const clickSound = document.getElementById('click-sound');
        const volSlider = document.getElementById('volume-control');
        const musicSvg = document.getElementById('music-svg');
        const playerUi = document.getElementById('player-ui');

        const icons = {
            muted: '<path d="M11 5L6 9H2V15H6L11 19V5Z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>',
            low: '<path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>',
            high: '<path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>'
        };

        function updateUI() {
            let v = parseFloat(volSlider.value);
            if (v < 0.01) v = 0;
            bgMusic.volume = v;
            bgMusic.muted = (v === 0);

            const percent = v * 100;
            volSlider.style.background = `linear-gradient(to right, #fff 0%, #fff ${percent}%, rgba(255,255,255,0.2) ${percent}%, rgba(255,255,255,0.2) 100%)`;

            const playing = !bgMusic.paused && v > 0;
            playerUi.classList.toggle('playing', playing);

            if (bgMusic.paused || v === 0) musicSvg.innerHTML = icons.muted;
            else if (v < 0.5) musicSvg.innerHTML = icons.low;
            else musicSvg.innerHTML = icons.high;
        }

        volSlider.addEventListener('input', () => {
            if (bgMusic.paused && volSlider.value > 0.05) bgMusic.play();
            updateUI();
        });

        function toggleMute() {
            playClick();
            if (bgMusic.paused) {
                bgMusic.play();
                if (parseFloat(volSlider.value) < 0.05) volSlider.value = 0.5;
            } else {
                bgMusic.pause();
            }
            updateUI();
        }

        function playClick() {
            clickSound.currentTime = 0;
            clickSound.volume = 0.4;
            clickSound.play().catch(() => { });
        }

        document.body.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    bgMusic.volume = 0.5;
                    volSlider.value = 0.5;
                    updateUI();
                }).catch(() => { });
            }
        }, { once: true });

        bgMusic.addEventListener('play', updateUI);
        bgMusic.addEventListener('pause', updateUI);

        /* ================= TOAST ================= */
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>' + msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        function copyEmail() {
            const email = CONFIG.email;
            const done = () => showToast('Đã sao chép email!');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(email).then(done).catch(() => fallbackCopy(email, done));
            } else {
                fallbackCopy(email, done);
            }
        }
        function fallbackCopy(text, cb) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); cb(); } catch (e) {}
            document.body.removeChild(ta);
        }

        /* ================= BUILD PROFILE ================= */
        const p = CONFIG.profile;
        document.getElementById('user-name').innerText = p.name;
        document.getElementById('user-nickname').innerText = p.nickname;

        if (p.bio) {
            const bioEl = document.getElementById('user-bio');
            bioEl.innerText = p.bio;
            bioEl.style.display = 'block';
        }
        if (p.verified) document.getElementById('verified-badge').style.display = 'block';

        const dot = document.getElementById('status-dot');
        dot.className = 'status-dot ' + (p.status || 'online');

        /* ================= BUILD TABS ================= */
        const header = document.getElementById('tabs-header');
        const masterSlider = document.getElementById('master-slider');
        const slider = document.getElementById('slider');
        const tabCount = CONFIG.tabs.length;

        function linkHtml(l) {
            const key = l.icon || guessIcon(l.title, l.url);
            const icon = BRAND_ICONS[key] || BRAND_ICONS.link;
            const desc = l.desc ? `<span class="btn-desc">${l.desc}</span>` : '';
            return `<a href="${l.url}" class="btn-link" target="_blank" rel="noopener" onclick="playClick()">
                        <span class="btn-icon ic-${key}">${icon}</span>
                        <span class="btn-text"><span class="btn-title">${l.title}</span>${desc}</span>
                        ${ARROW}
                    </a>`;
        }

        CONFIG.tabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = tab.title;
            btn.onclick = () => { playClick(); handleTabClick(index); };
            header.appendChild(btn);

            const section = document.createElement('div');
            section.className = `content-section ${index === 0 ? 'active' : ''}`;
            let html = tab.links.map(linkHtml).join('');

            if (tab.showSpecial) {
                html += `<div class="btn-link" id="email-btn" onclick="playClick(); copyEmail()">
                            <span class="btn-icon ic-email">${BRAND_ICONS.email}</span>
                            <span class="btn-text"><span class="btn-title">Email</span><span class="btn-desc">${CONFIG.email}</span></span>
                            ${ARROW}
                         </div>
                         <div class="zalo-expansion-container" id="zalo-box" onclick="playClick(); toggleZalo()">
                            <div class="zalo-head">
                                <span class="btn-icon ic-zalo">${BRAND_ICONS.zalo}</span>
                                <span class="btn-text"><span class="btn-title">Zalo QR Code</span><span class="btn-desc">Bấm để hiện mã QR</span></span>
                                ${ARROW}
                            </div>
                            <div class="qr-reveal"><img src="zalo-qr.jpg" alt="Zalo QR" class="qr-image-auto" loading="lazy"></div>
                         </div>`;
            }
            section.innerHTML = html;
            masterSlider.appendChild(section);
        });

        function updateSlider(index) {
            const tabWidth = (header.clientWidth - 10) / tabCount;
            slider.style.width = `${tabWidth}px`;
            slider.style.transform = `translateX(${index * tabWidth}px)`;
            masterSlider.style.transform = `translateX(-${index * 100}%)`;
        }

        function handleTabClick(index) {
            updateSlider(index);
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
            document.querySelectorAll('.content-section').forEach((s, i) => s.classList.toggle('active', i === index));
        }

        function toggleZalo() { document.getElementById('zalo-box').classList.toggle('open'); }

        window.addEventListener('load', () => { updateSlider(0); updateUI(); });
        window.addEventListener('resize', () => {
            const active = [...document.querySelectorAll('.tab-btn')].findIndex(b => b.classList.contains('active'));
            updateSlider(active < 0 ? 0 : active);
        });
        playerUi.addEventListener('touchstart', (e) => { if (e.target !== volSlider) playerUi.classList.toggle('active'); });

        /* ================= PRELOADER ================= */
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('preloader').classList.add('hide'), 350);
        });
        // Phòng trường hợp 'load' đến chậm
        setTimeout(() => document.getElementById('preloader').classList.add('hide'), 2500);

        /* ================= PARTICLES ================= */
        (function () {
            const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (reduce) return;
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let w, h, particles;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                const count = Math.min(60, Math.floor(w * h / 24000));
                particles = Array.from({ length: count }, () => ({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.8 + 0.4,
                    vx: (Math.random() - 0.5) * 0.25,
                    vy: -(Math.random() * 0.4 + 0.1),
                    a: Math.random() * 0.5 + 0.1
                }));
            }

            function tick() {
                ctx.clearRect(0, 0, w, h);
                for (const pt of particles) {
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    if (pt.y < -5) { pt.y = h + 5; pt.x = Math.random() * w; }
                    if (pt.x < -5) pt.x = w + 5;
                    if (pt.x > w + 5) pt.x = -5;
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${pt.a})`;
                    ctx.fill();
                }
                requestAnimationFrame(tick);
            }
            window.addEventListener('resize', resize);
            resize();
            tick();
        })();
    </script>
</body>

</html>
